name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:

  test:

    strategy:
      fail-fast: false

      matrix:

        os:
          - windows-latest
          - ubuntu-latest

        python-version:
          - "3.12"

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install package
        run: |
          pip install -e .

      - name: Install dev dependencies
        run: |
          pip install pytest
          pip install pytest-cov
          pip install ruff

      - name: Ruff
        run: |
          ruff check .

      - name: Pytest
        run: |
          pytest -v --cov=src --cov-report=term-missing